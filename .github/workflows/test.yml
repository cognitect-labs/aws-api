name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-east-1

jobs:
  tests-using-java:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        java-version: [ '8', '11', '17', '21', '25' ]
        clojure-version: ['clojure-1.11', 'clojure-1.12']

    name: Tests with Java ${{ matrix.java-version }}, ${{ matrix.clojure-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Cache build materials and clojure deps
        uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-maven-cljdeps-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}

      - name: Print java version
        run: java -version

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: 1.12.4.1618

      - name: Print Clojure version
        run: clojure -M:dev:${{ matrix.clojure-version }} -e "(println (clojure-version))"

      - name: Run unit tests
        run: clojure -M:dev:test:${{ matrix.clojure-version }}


  integration-tests-using-java:
    runs-on: ubuntu-24.04
    strategy:
      # Smaller matrix for integration tests, hopefully avoid rate-limiting on s3 bucket access
      matrix:
        java-version: [ '8', '25' ]
        clojure-version: ['clojure-1.11', 'clojure-1.12']

    name: Integration tests with Java ${{ matrix.java-version }}, ${{ matrix.clojure-version }}

    services:
      s3:
        image: bitnamilegacy/minio
        ports:
          - 9000:9000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Cache build materials and clojure deps
        uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-maven-cljdeps-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}

      - name: Print java version
        run: java -version

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: 1.12.4.1618
          bb: 1.12.214

      - name: Print Clojure version
        run: clojure -M:dev:${{ matrix.clojure-version }} -e "(println (clojure-version))"

      - name: Run integration tests
        env:
          # AWS_PROFILE is only required to comply with fixture check,
          # it's not actually used to load credentials
          AWS_PROFILE: aws-api-test
          AWS_ACCESS_KEY_ID: ${{ secrets.INTEGRATION_TEST_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INTEGRATION_TEST_AWS_SECRET_ACCESS_KEY }}

        run: clojure -M:dev:test-integration:${{ matrix.clojure-version }}

      - name: Run babashka tests
        env:
          # AWS_PROFILE is only required to comply with fixture check,
          # it's not actually used to load credentials
          AWS_PROFILE: aws-api-test
          AWS_ACCESS_KEY_ID: ${{ secrets.INTEGRATION_TEST_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INTEGRATION_TEST_AWS_SECRET_ACCESS_KEY }}

        run: bb test-bb
